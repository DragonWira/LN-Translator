name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ] # Sesuaikan ke 'master' jika branch utama lu bukan main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install and Build Project
      run: |
        # 1. Wajib masuk ke folder project tempat package.json berada
        cd project
        
        # 2. Install semua library-nya
        npm install
        
        # 3. Paksa Vite build pake base path nama repo lu biar gak blank putih lagi
        npx vite build --base=/LN-Translator/

    - name: Upload Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        # Kita arahkan ke folder dist yang ada di dalam folder project
        path: ./project/dist

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      run: |
        # Kita ganti npx webpack milik lu menjadi perintah build bawaan Vite
        npm run build

    - name: Upload Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist # Folder hasil build utama Vite

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
