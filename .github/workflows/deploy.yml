name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ] # Sesuaikan kalau branch utama lu namanya 'master'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: |
        # Jika file package.json lu ada di dalam folder lagi (misal folder 'project'), 
        # tambahkan perintah 'cd nama-folder' di baris baru sebelum npm install.
        npm install

    - name: Build with Vite
      run: |
        # Kita ganti npx webpack milik lu menjadi perintah build bawaan Vite
        npm run build

    - name: Upload Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist # Folder hasil build utama Vite

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
